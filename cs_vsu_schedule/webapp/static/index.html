<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание ВГУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="app">
        <header>
            <div class="user-info" id="user-info">
                <div class="skeleton" style="width: 150px; height: 20px;"></div>
            </div>
            <div class="week-badge" id="week-badge">...</div>
        </header>

        <nav class="days-nav" id="days-nav">
            <button class="day-btn active" data-day="Понедельник">Пн</button>
            <button class="day-btn" data-day="Вторник">Вт</button>
            <button class="day-btn" data-day="Среда">Ср</button>
            <button class="day-btn" data-day="Четверг">Чт</button>
            <button class="day-btn" data-day="Пятница">Пт</button>
            <button class="day-btn" data-day="Суббота">Сб</button>
        </nav>

        <main id="schedule-container">
            <div class="loading-container">
                <div class="loader"></div>
                <p>Загрузка расписания...</p>
            </div>
        </main>

        <div id="registration-overlay" class="overlay hidden">
            <div class="modal">
                <h2>Регистрация</h2>
                <div class="form-group">
                    <label>Курс</label>
                    <select id="course-select">
                        <option value="">Выберите курс</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Группа</label>
                    <select id="group-select" disabled>
                        <option value="">Выберите группу</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Подгруппа</label>
                    <div class="subgroup-toggle">
                        <button class="sub-btn active" data-val="1">1</button>
                        <button class="sub-btn" data-val="2">2</button>
                    </div>
                </div>
                <button id="save-profile" class="primary-btn">Сохранить</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
