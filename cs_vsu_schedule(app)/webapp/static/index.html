<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание ВГУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">
    <div id="app">
        <header>
            <div class="user-info" id="user-info">
                <div class="skeleton" style="width: 150px; height: 20px;"></div>
            </div>
            <div class="header-actions">
                <button id="search-btn" class="icon-btn">🔍</button>
                <div class="week-badge" id="week-badge">...</div>
                <button id="settings-btn" class="icon-btn">⚙️</button>
            </div>
        </header>

        <nav class="days-nav" id="days-nav">
            <button class="day-btn active" data-day="Понедельник">Пн</button>
            <button class="day-btn" data-day="Вторник">Вт</button>
            <button class="day-btn" data-day="Среда">Ср</button>
            <button class="day-btn" data-day="Четверг">Чт</button>
            <button class="day-btn" data-day="Пятница">Пт</button>
            <button class="day-btn" data-day="Суббота">Сб</button>
        </nav>

        <div id="countdown-container" class="countdown-card hidden">
            <div class="countdown-label" id="countdown-label"></div>
            <div class="countdown-timer" id="countdown-timer"></div>
            <div id="countdown-intra" class="countdown-intra"></div>
            <div class="countdown-sub" id="countdown-sub"></div>
        </div>

        <main id="schedule-container">
            <div class="loading-container">
                <div class="loader"></div>
                <p>Загрузка расписания...</p>
            </div>
        </main>

        <!-- Поиск -->
        <div id="search-overlay" class="overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>Поиск</h2>
                    <button class="close-btn" id="close-search">&times;</button>
                </div>
                <div class="search-tabs">
                    <button class="tab-btn active" data-tab="teacher">👨‍🏫 Препод</button>
                    <button class="tab-btn" data-tab="rooms">🚪 Аудитории</button>
                </div>
                <div id="teacher-search-box" class="search-box">
                    <div class="form-group">
                        <input type="text" id="teacher-input" placeholder="Фамилия преподавателя...">
                    </div>
                    <button id="do-teacher-search" class="primary-btn">Найти пары</button>
                </div>
                <div id="rooms-search-box" class="search-box hidden">
                    <div class="form-group"><label>День недели</label><select id="room-day-select"></select></div>
                    <div class="form-group"><label>Тип недели</label><select id="room-week-select"><option value="0">Числитель</option><option value="1">Знаменатель</option></select></div>
                    <div class="form-group"><label>Выберите пару по времени</label><select id="room-slot-select"></select></div>
                    <button id="do-room-search" class="primary-btn">Найти свободные</button>
                </div>
                <div id="search-results" class="search-results-list"></div>
            </div>
        </div>

        <!-- Настройки времени -->
        <div id="time-settings-overlay" class="overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>Трекер времени</h2>
                    <button class="close-btn" id="close-time-settings">&times;</button>
                </div>
                <div class="modal-scroll-area">
                    <div class="form-group-flex">
                        <label>Виджет отсчета</label>
                        <input type="checkbox" id="timer-toggle" class="toggle-switch">
                    </div>
                    <div class="form-group">
                        <label>Начинать отсчет утром</label>
                        <select id="timer-threshold-select">
                            <option value="0">С начала дня (00:00)</option>
                            <option value="5">За 5 часов до пары</option>
                            <option value="2">За 2 часа до пары</option>
                            <option value="1">За 1 час до пары</option>
                            <option value="-1">Только во время пар</option>
                        </select>
                    </div>
                    <div class="form-group-flex">
                        <label>Отсчет до перерыва (5 мин)</label>
                        <input type="checkbox" id="intra-break-toggle" class="toggle-switch">
                    </div>
                </div>
                <button id="back-to-settings" class="primary-btn">Готово</button>
            </div>
        </div>

        <!-- Регистрация -->
        <div id="registration-overlay" class="overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="reg-title">Регистрация</h2>
                    <button class="close-btn" id="close-registration">&times;</button>
                </div>
                <div class="form-group"><label>Курс</label><select id="course-select"><option value="">Выберите курс</option></select></div>
                <div class="form-group"><label>Группа</label><select id="group-select" disabled><option value="">Выберите группу</option></select></div>
                <div class="form-group">
                    <label>Подгруппа</label>
                    <div class="subgroup-toggle"></div>
                </div>
                <button id="save-profile" class="primary-btn">Сохранить</button>
            </div>
        </div>

        <!-- Основные настройки -->
        <div id="settings-overlay" class="overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>Настройки</h2>
                    <button class="close-btn" id="close-settings">&times;</button>
                </div>
                <div class="modal-scroll-area">
                    <div class="settings-section">
                        <h3>Режим отображения</h3>
                        <div class="mode-grid">
                            <button class="mode-btn" data-mode="обычный">Обычный</button>
                            <button class="mode-btn" data-mode="po***">Po***</button>
                            <button class="mode-btn" data-mode="пивко">Пивко</button>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Трекер</h3>
                        <button id="open-time-settings" class="secondary-btn">Управление временем 🕒</button>
                    </div>
                    <div class="settings-section">
                        <h3>Профиль</h3>
                        <button id="edit-profile-btn" class="secondary-btn">Изменить курс/группу</button>
                    </div>
                    <div class="settings-section">
                        <h3>Поддержка</h3>
                        <button id="open-report-btn" class="secondary-btn">Сообщить об ошибке</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Жалоба -->
        <div id="report-overlay" class="overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>Жалоба</h2>
                    <button class="close-btn" id="close-report">&times;</button>
                </div>
                <p class="hint">Опишите проблему:</p>
                <textarea id="report-text" placeholder="Ваше сообщение..."></textarea>
                <button id="send-report" class="primary-btn">Отправить админу</button>
            </div>
        </div>
    </div>
    <script src="script.js?v=4.0"></script>
</body>

</html>
